<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestamos CC - Gold Edition</title>
    <style>
        :root { 
            --bg-page: #E9E4E0; --bg-card: #ffffff; --bg-dark: #172A39; 
            --bg-input: #f3f4f6; --primary-orange: #FC563C; --accent-blue: #3B82F6;
            --text-main: #172A39; --text-light: #ffffff; --success-green: #22C55E;
            --danger-red: #EF4444; --secondary-text: #6B7280; --border-color: #d1d5db;
        }
        body.dark-mode {
            --bg-page: #0D161D; --bg-card: #172A39; --bg-dark: #111827;
            --bg-input: #1F3647; --text-main: #E9E4E0; --border-color: rgba(233, 228, 224, 0.1);
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-page); margin: 0; padding: 20px; color: var(--text-main); transition: background 0.4s; }
        .container { max-width: 1300px; margin: auto; background: var(--bg-card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); border-top: 8px solid var(--bg-dark); }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .capital-section { background: var(--bg-dark); color: white; padding: 15px 25px; border-radius: 12px; text-align: center; border-left: 5px solid var(--primary-orange); }
        .capital-section input { background: transparent; color: var(--primary-orange); border: none; font-size: 1.5em; font-weight: bold; width: 130px; text-align: center; outline: none; }
        .tools-box { display: flex; gap: 10px; margin-bottom: 20px; background: var(--bg-dark); padding: 15px; border-radius: 12px; flex-wrap: wrap; justify-content: center; }
        .btn-tool { padding: 10px 15px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; border: none; color: white; transition: 0.2s; }
        .btn-tool:hover { opacity: 0.8; }
        .search-input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); border-bottom: 4px solid var(--primary-orange); }
        .stat-card p { margin: 5px 0 0; font-size: 1.5em; font-weight: bold; color: var(--primary-orange); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; background: var(--bg-input); padding: 20px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--bg-dark); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); }
        .circle { width: 36px; height: 36px; border-radius: 8px; border: 2px solid var(--border-color); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .checked { background: var(--success-green) !important; color: white; }
    </style>
</head>
<body class="dark-mode">

<div class="container">
    <div class="header-box">
        <h2>💰 Prestamos CC</h2>
        <div class="capital-section">
            <small>SALDO REAL</small><br>
            $ <input type="number" id="capitalGlobal" value="0.00" readonly>
        </div>
    </div>

    <div class="tools-box">
        <button class="btn-tool" onclick="toggleTheme()" id="themeBtn">☀️ MODO CLARO</button>
        <button class="btn-tool" style="background:var(--accent-blue)" onclick="auditoriaBase()">📊 AUDITORÍA</button>
        <button class="btn-tool" style="background:var(--primary-orange)" onclick="guardarEnNube()">☁️ GUARDAR</button>
        <button class="btn-tool" style="background:#6d28d9" onclick="cargarDeNube()">🔄 ACTUALIZAR</button>
    </div>

    <input type="text" id="busqueda" class="search-input" placeholder="🔍 Buscar..." onkeyup="renderizarTabla()">
    
    <div class="stats-grid">
        <div class="stat-card"><h4>Interés Total</h4><p id="gananciaTotal">$ 0.00</p></div>
    </div>

    <div class="form-grid">
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="number" id="monto" placeholder="Monto $">
        <button onclick="procesarPrestamo()" style="background:var(--primary-orange); color:white">Registrar</button>
    </div>

    <table id="cuerpoTabla"></table>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxHaw7aMmQzleD-ad8MxaHk4ac3umcCpHsZV1DVMpLXTv42PzV0EGJiy4jp8UTOvF4f/exec";
    let capitalTotal = 0;
    let prestamos = [];

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    async function guardarEnNube() {
        if (!confirm("¿Guardar datos en la nube?")) return;
        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ capital: capitalTotal, prestamos: prestamos })
            });
            alert("✅ Solicitud de guardado enviada.");
        } catch (e) {
            alert("❌ Error: " + e.message);
        }
    }

    async function cargarDeNube() {
        try {
            // Usamos un pequeño truco para evitar el bloqueo CORS si persiste
            const response = await fetch(WEB_APP_URL + "?nocache=" + new Date().getTime());
            const data = await response.json();
            prestamos = data.prestamos || [];
            capitalTotal = parseFloat(data.capital) || 0;
            alert("✅ Datos cargados correctamente.");
        } catch (e) {
            alert("❌ Error de conexión. Asegúrate de que el script tenga permisos de 'Cualquiera'.");
        }
    }

    window.onload = () => cargarDeNube();
</script>
</body>
</html>
