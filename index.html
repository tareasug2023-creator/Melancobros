<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestamos CC - Gold Edition</title>
    <style>
        /* VARIABLES DE COLOR DUALES */
        :root { 
            --bg-page: #E9E4E0; 
            --bg-card: #ffffff;
            --bg-dark: #172A39; 
            --bg-input: #f3f4f6;
            --primary-orange: #FC563C; 
            --accent-blue: #3B82F6;
            --text-main: #172A39;
            --text-light: #ffffff;
            --success-green: #22C55E;
            --danger-red: #EF4444;
            --secondary-text: #6B7280;
            --border-color: #d1d5db;
        }

        /* SOBRESCRITURA PARA MODO OSCURO */
        body.dark-mode {
            --bg-page: #0D161D; 
            --bg-card: #172A39; 
            --bg-dark: #111827;
            --bg-input: #1F3647; 
            --text-main: #E9E4E0;
            --border-color: rgba(233, 228, 224, 0.1);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-page); 
            margin: 0; 
            padding: 20px; 
            color: var(--text-main); 
            transition: background 0.4s, color 0.4s; 
        }
        
        .container { 
            max-width: 1300px; 
            margin: auto; 
            background: var(--bg-card); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); 
            border-top: 8px solid var(--bg-dark);
            transition: background 0.4s, border 0.4s;
        }

        .header-box { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            gap: 15px; 
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }
        
        h2 { margin: 0; font-weight: 800; letter-spacing: 1px; }

        .capital-section { 
            background: var(--bg-dark); 
            color: white; 
            padding: 15px 25px; 
            border-radius: 12px; 
            text-align: center; 
            border-left: 5px solid var(--primary-orange);
        }
        .capital-section input { 
            background: transparent; 
            color: var(--primary-orange); 
            border: none; 
            font-size: 1.5em; 
            font-weight: bold; 
            width: 130px; 
            text-align: center; 
            outline: none; 
        }

        .tools-box { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            flex-wrap: wrap; 
            justify-content: center; 
            background: var(--bg-dark); 
            padding: 15px; 
            border-radius: 12px; 
        }
        .btn-tool { 
            padding: 10px 15px; 
            border-radius: 8px; 
            font-size: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            border: none; 
            color: white; 
            transition: 0.2s; 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-tool:hover { opacity: 0.8; transform: translateY(-1px); }
        
        /* Estilo específico para el botón de tema en la barra */
        .btn-theme {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--primary-orange);
        }

        .btn-audit { background: var(--accent-blue); }
        .btn-history { background: var(--primary-orange); }

        .notif-panel { 
            background: #fee2e2; 
            border: 2px solid var(--danger-red); 
            border-radius: 15px; 
            padding: 20px; 
            margin-bottom: 25px; 
            display: none; 
            color: #172A39;
        }
        body.dark-mode .notif-panel { background: #450a0a; color: #fecaca; }
        .notif-title { font-weight: 900; font-size: 15px; margin-bottom: 12px; text-transform: uppercase; }
        .notif-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px; 
            background: white; 
            border-radius: 10px; 
            margin-bottom: 8px;
            color: #172A39;
        }
        body.dark-mode .notif-item { background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.1); }

        .search-input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 1px solid var(--border-color); 
            background: var(--bg-card); 
            color: var(--text-main); 
            margin-bottom: 20px; 
            box-sizing: border-box;
        }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { 
            background: var(--bg-card); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
            border-bottom: 4px solid var(--primary-orange); 
            color: var(--text-main);
        }
        body.dark-mode .stat-card { background: rgba(0,0,0,0.2); }
        .stat-card h4 { margin: 0; font-size: 0.8em; opacity: 0.7; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 1.5em; font-weight: bold; color: var(--primary-orange); }

        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 10px; 
            margin-bottom: 20px; 
            background: var(--bg-input); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
        }
        
        input, select { 
            padding: 12px; 
            background: var(--bg-card); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            color: var(--text-main); 
            width: 100%; 
            box-sizing: border-box; 
        }
        
        button { padding: 12px; background: var(--bg-dark); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-cloud { background-color: var(--success-green); }

        .month-divider { 
            background: #111827 !important; 
            color: var(--primary-orange) !important; 
            font-weight: bold; 
            padding: 12px !important; 
            cursor: pointer; 
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; overflow: hidden; border-radius: 12px; }
        th { background: var(--bg-dark); text-align: left; padding: 15px; color: white; font-size: 0.8em; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border-color); background: var(--bg-card); vertical-align: middle; }

        .badge { font-size: 10px; padding: 3px 7px; border-radius: 5px; color: white; font-weight: 800; text-transform: uppercase; margin-left: 5px; display: inline-block; }
        .badge-semanal { background: #5d9b9b; }
        .badge-quincenal { background: var(--primary-orange); }

        .payment-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; }
        .square-pay { display: flex; flex-direction: column; align-items: center; min-width: 45px; }
        .circle { 
            width: 36px; height: 36px; border-radius: 8px; border: 2px solid var(--border-color); 
            display: flex; align-items: center; justify-content: center; cursor: pointer; 
            background: transparent; color: var(--text-main); font-weight: bold; transition: 0.2s;
        }
        .circle.checked { background: var(--success-green) !important; color: white !important; border-color: var(--success-green); }
        .circle.x-mark { background: var(--danger-red) !important; color: white !important; border-color: var(--danger-red); }
        .circle.extra-fee { border-color: var(--primary-orange); border-style: dashed; }
        .circle.extra-fee.checked { background: var(--primary-orange) !important; color: white !important; }

        .date-label { font-size: 9px; color: var(--secondary-text); margin-top: 4px; font-weight: bold; }
        .btn-action { 
            background: var(--bg-input); border: none; font-size: 16px; cursor: pointer; 
            padding: 8px; border-radius: 8px; transition: 0.2s; color: var(--text-main);
        }
        .btn-action:hover { background: var(--bg-dark); color: white; }
    </style>
</head>
<body class="dark-mode">

<div class="container">
    <div class="header-box">
        <h2>💰 Prestamos CC</h2>
        <div class="capital-section">
            <small>SALDO REAL EN CAJA</small><br>
            $ <input type="number" id="capitalGlobal" step="0.01" value="0.00" readonly>
            <div style="cursor:pointer; text-decoration:underline; font-size:10px; margin-top:5px; color: var(--primary-orange);" onclick="ajustarCapitalConClave()">Ajustar</div>
        </div>
    </div>

    <div class="tools-box">
        <!-- BOTÓN DE TEMA INTEGRADO EN LA BARRA -->
        <button class="btn-tool btn-theme" onclick="toggleTheme()" id="themeBtn">☀️ MODO CLARO</button>
        
        <button class="btn-tool btn-audit" onclick="auditoriaBase()">📊 AUDITORÍA</button>
        <button class="btn-tool btn-history" onclick="generarPaginaReporte()">📋 REPORTES</button>
        <button onclick="guardarEnNube()" class="btn-tool" style="background:var(--success-green);">☁️ GUARDAR</button>
        <button onclick="cargarDeNube()" class="btn-tool" style="background:#6d28d9;">🔄 ACTUALIZAR</button>
    </div>

    <!-- PANEL DE NOTIFICACIONES -->
    <div id="notifPanel" class="notif-panel">
        <div class="notif-title">🚨 COBROS PENDIENTES PARA HOY:</div>
        <div id="notifList"></div>
    </div>

    <input type="text" id="busqueda" class="search-input" placeholder="🔍 Buscar cliente por nombre..." onkeyup="renderizarTabla()">

    <div class="stats-grid">
        <div class="stat-card"><h4>Interés Cobrado Total</h4><p id="gananciaTotal">$ 0.00</p></div>
        <div class="stat-card"><h4>Interés Cobrado Mes</h4><p id="gananciaMes">$ 0.00</p></div>
    </div>

    <div class="form-grid" id="mainForm">
        <input type="text" id="nombre" placeholder="Nombre Cliente" onkeyup="autoRellenar()">
        <input type="text" id="celular" placeholder="WhatsApp">
        <input type="number" id="monto" placeholder="Monto $">
        <input type="number" id="porcentaje" placeholder="Interés %">
        <select id="modalidad" onchange="cambiarModalidad()">
            <option value="semanal">Cobro Semanal</option>
            <option value="quincenal">Cobro Quincenal</option>
        </select>
        <input type="number" id="semanas" placeholder="Semanas" min="1">
        <input type="date" id="fechaInicio">
        <button id="btnRegistrar" onclick="procesarPrestamo()" style="background:var(--primary-orange); color:white">Registrar</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>CLIENTE / INFO</th>
                <th width="160">ESTADO / CUOTA</th>
                <th>PAGOS (Programados +7 días)</th>
                <th>ACCIONES</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxRy5nsXGQ3sHjIR_xKYDJG_PLcXVnhN_kbLl_83CXORPZ587iMU9qwwnG5HStpQRmwQQ/exec"; 
    const CONTRASENA_ADMIN = "Sirius2024"; 

    let capitalTotal = 0;
    let prestamos = [];
    let editandoID = null;
    let mesesColapsados = {};

    // --- FUNCIÓN DE CAMBIO DE TEMA ACTUALIZADA ---
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        body.classList.toggle('dark-mode');
        
        if (body.classList.contains('dark-mode')) {
            btn.innerHTML = '☀️ MODO CLARO';
        } else {
            btn.innerHTML = '🌙 MODO OSCURO';
        }
        renderizarTabla();
    }

    function renderizarTabla() {
        const tbody = document.getElementById('cuerpoTabla');
        const query = document.getElementById('busqueda').value.toLowerCase();
        tbody.innerHTML = ""; let uMes = "";
        
        prestamos.forEach(p => {
            if (query && !p.nombre.toLowerCase().includes(query)) return;
            const fO = new Date(p.fechaInicio + "T00:00:00"), mesId = fO.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            if (mesId !== uMes) {
                const trM = document.createElement('tr');
                trM.innerHTML = `<td colspan="4" class="month-divider" onclick="toggleMes('${mesId}')">${mesId.toUpperCase()} ${mesesColapsados[mesId] ? '🔽' : '🔼'}</td>`;
                tbody.appendChild(trM); uMes = mesId;
            }
            if (mesesColapsados[mesId]) return;

            const tr = document.createElement('tr');
            let squares = '<div class="payment-scroll">';
            let ultimaFechaAsignada = new Date(p.fechaInicio + "T00:00:00");

            p.pagos.forEach((pag, i) => {
                let fP = new Date(p.fechaInicio + "T00:00:00");
                if (pag.tipo === 'extra') {
                    ultimaFechaAsignada.setDate(ultimaFechaAsignada.getDate() + 7);
                    fP = new Date(ultimaFechaAsignada);
                } else {
                    if (p.modalidad === 'quincenal') fP.setDate(fP.getDate() + (i === 0 ? 15 : 30));
                    else fP.setDate(fP.getDate() + ((i + 1) * 7));
                    ultimaFechaAsignada = new Date(fP);
                }
                
                squares += `<div class="square-pay">
                    <div class="circle ${pag.estado===1?'checked':(pag.estado===2?'x-mark':'')} ${pag.tipo==='extra'?'extra-fee':''}" onclick="togglePago(${p.id},${i})">${i+1}</div>
                    <span class="date-label">${fP.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})}</span>
                </div>`;
            });
            squares += `<div class="circle" style="border:2px dashed var(--primary-orange); color:var(--primary-orange); background:transparent" onclick="agregarMulta(${p.id})">+</div></div>`;
            
            const link = `https://tareasug2023-creator.github.io/Cobros-/lector.html?id=${p.id}`;
            const badgeClass = p.modalidad === 'quincenal' ? 'badge-quincenal' : 'badge-semanal';

            tr.innerHTML = `<td>
                <strong>${p.nombre}</strong> <span class="badge ${badgeClass}">${p.modalidad}</span><br>
                <small style="color:var(--secondary-text)">📅 Inicio: ${p.fechaInicio}</small>
            </td>
            <td>
                <div style="font-weight:bold; color:var(--primary-orange)">Cuota: $${p.valorCuotaOriginal.toFixed(2)}</div>
                <div style="font-size:11px; color:var(--secondary-text)">Deuda: $${p.totalCobrar.toFixed(2)}</div>
            </td>
            <td>${squares}</td>
            <td><div style="display:flex; gap:5px;">
                <button class="btn-action" onclick="prepararEdicion(${p.id})">✏️</button>
                <button class="btn-action" onclick="enviarRecordatorio(${p.id})">📞</button>
                <button class="btn-action" onclick="navigator.clipboard.writeText('${link}').then(()=>alert('Copiado'))">🔗</button>
                <button class="btn-action" onclick="menuEliminar(${p.id})">🗑️</button>
            </div></td>`;
            tbody.appendChild(tr);
        });
    }

    function generarNotificaciones() {
        const list = document.getElementById('notifList');
        const hoy = new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});
        list.innerHTML = ""; let hoyCount = 0;
        
        prestamos.forEach(p => {
            let ultimaFechaAsignada = new Date(p.fechaInicio + "T00:00:00");
            p.pagos.forEach((pago, i) => {
                if (pago.estado === 0) {
                    let fP = new Date(p.fechaInicio + "T00:00:00");
                    if (pago.tipo === 'extra') {
                        ultimaFechaAsignada.setDate(ultimaFechaAsignada.getDate() + 7);
                        fP = new Date(ultimaFechaAsignada);
                    } else {
                        if (p.modalidad === 'quincenal') fP.setDate(fP.getDate() + (i === 0 ? 15 : 30));
                        else fP.setDate(fP.getDate() + ((i + 1) * 7));
                        ultimaFechaAsignada = new Date(fP);
                    }
                    if (fP.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}) === hoy) {
                        hoyCount++;
                        list.innerHTML += `<div class="notif-item"><span>👤 <b>${p.nombre}</b> ($${pago.valor.toFixed(2)})</span><button class="btn-send-notif" onclick="enviarRecordatorio(${p.id})">📲 COBRAR TODO</button></div>`;
                    }
                } else {
                    let fP = new Date(p.fechaInicio + "T00:00:00");
                    if (pago.tipo === 'extra') ultimaFechaAsignada.setDate(ultimaFechaAsignada.getDate() + 7);
                    else {
                        if (p.modalidad === 'quincenal') fP.setDate(fP.getDate() + (i === 0 ? 15 : 30));
                        else fP.setDate(fP.getDate() + ((i + 1) * 7));
                        ultimaFechaAsignada = new Date(fP);
                    }
                }
            });
        });
        document.getElementById('notifPanel').style.display = hoyCount > 0 ? "block" : "none";
    }

    function enviarRecordatorio(id) {
        const p = prestamos.find(x => x.id === id);
        const link = `https://tareasug2023-creator.github.io/Cobros-/lector.html?id=${p.id}`;
        let cel = p.celular.replace(/\D/g, ''); if (cel.startsWith('0')) cel = cel.substring(1);
        const hoy = new Date(); hoy.setHours(0,0,0,0);
        let tHoy = 0, tAtr = 0, tMul = 0, cAtr = 0;
        let ultimaFecha = new Date(p.fechaInicio + "T00:00:00");
        p.pagos.forEach((pag, i) => {
            let fP = new Date(p.fechaInicio + "T00:00:00");
            if (pag.tipo === 'extra') { ultimaFecha.setDate(ultimaFecha.getDate() + 7); fP = new Date(ultimaFecha); }
            else { if (p.modalidad === 'quincenal') fP.setDate(fP.getDate() + (i === 0 ? 15 : 30)); else fP.setDate(fP.getDate() + ((i + 1) * 7)); ultimaFecha = new Date(fP); }
            fP.setHours(0,0,0,0);
            if (pag.estado !== 1) {
                if (pag.tipo === 'extra') tMul += pag.valor;
                else { if (fP.getTime() === hoy.getTime()) tHoy += pag.valor; else if (fP.getTime() < hoy.getTime()) { tAtr += pag.valor; cAtr++; } }
            }
        });
        let msg = `Hola *${p.nombre}*, de *Prestamos CC*.\n\n` + (tHoy > 0 ? `📌 Hoy vence cuota: *$${tHoy.toFixed(2)}*.\n` : "") + (tAtr > 0 ? `⚠️ Tienes *${cAtr} atrasadas* ($${tAtr.toFixed(2)}).\n` : "") + (tMul > 0 ? `❗ Multas: *$${tMul.toFixed(2)}*.\n` : "") + `\n💵 *TOTAL A PAGAR: $${(tHoy + tAtr + tMul).toFixed(2)}*\n\nDetalle: ${link}`;
        window.open(`https://api.whatsapp.com/send?phone=593${cel}&text=${encodeURIComponent(msg)}`, '_blank');
    }

    function togglePago(pId, index) {
        const p = prestamos.find(x => x.id === pId), pago = p.pagos[index], ant = pago.estado;
        pago.estado = (pago.estado + 1) % 3;
        if (pago.estado === 1) capitalTotal += pago.valor; else if (ant === 1) capitalTotal -= pago.valor;
        actualizarUI();
    }

    function calcularGanancias() {
        let tReal = 0, mReal = 0, hoy = new Date();
        prestamos.forEach(p => {
            const capC = p.montoOriginal / (p.modalidad === 'quincenal' ? 2 : p.numSemanasOriginales);
            let marker = new Date(p.fechaInicio + "T00:00:00");
            p.pagos.forEach((pag, i) => {
                let fP = new Date(p.fechaInicio + "T00:00:00");
                if (pag.tipo === 'extra') { marker.setDate(marker.getDate() + 7); fP = new Date(marker); }
                else { if (p.modalidad === 'quincenal') fP.setDate(fP.getDate() + (i === 0 ? 15 : 30)); else fP.setDate(fP.getDate() + ((i + 1) * 7)); marker = new Date(fP); }
                if (pag.estado === 1) {
                    let g = (pag.tipo === 'extra' ? 5 : (pag.valor - capC)); tReal += g;
                    if (fP.getMonth() === hoy.getMonth() && fP.getFullYear() === hoy.getFullYear()) mReal += g;
                }
            });
        });
        document.getElementById('gananciaTotal').innerText = `$ ${tReal.toFixed(2)}`;
        document.getElementById('gananciaMes').innerText = `$ ${mReal.toFixed(2)}`;
    }

    function auditoriaBase() {
        if (prompt("Clave:") !== CONTRASENA_ADMIN) return;
        const base = 1000.00; let calle = 0, util = 0;
        prestamos.forEach(p => {
            const nC = p.modalidad === 'quincenal' ? 2 : p.numSemanasOriginales;
            const capC = p.montoOriginal / nC;
            const pags = p.pagos.filter(pag => pag.estado === 1 && pag.tipo !== 'extra').length;
            calle += (p.montoOriginal - (pags * capC));
            p.pagos.forEach(pag => { if(pag.estado === 1) util += (pag.tipo === 'extra' ? 5 : (pag.valor - capC)); });
        });
        capitalTotal = base - calle + util; actualizarUI();
        alert(`Auditoría:\nSaldo real proyectado: $${capitalTotal.toFixed(2)}`);
    }

    function generarPaginaReporte() {
        if (prestamos.length === 0) return;
        let reporte = {};
        prestamos.forEach(p => {
            const fO = new Date(p.fechaInicio + "T00:00:00"), mId = fO.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
            let gan = p.montoOriginal * (p.porcentajeOriginal / 100), mul = p.pagos.filter(pag => pag.tipo === 'extra' && pag.estado === 1).length * 5;
            if (!reporte[mId]) reporte[mId] = { prestado: 0, ganancia: 0, detalle: [] };
            reporte[mId].prestado += p.montoOriginal; reporte[mId].ganancia += (gan + mul);
            reporte[mId].detalle.push({ nombre: p.nombre, monto: p.montoOriginal, utilidad: gan + mul, fecha: p.fechaInicio });
        });
        const nv = window.open("", "_blank");
        let h = `<html><head><title>Reporte</title><style>body{font-family:sans-serif;background:#0D161D;color:#E9E4E0;padding:40px;} .card{background:#172A39;padding:20px;border-radius:15px;margin-bottom:20px;} table{width:100%;border-collapse:collapse;} th,td{padding:12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1);} .total{color:#FC563C;font-weight:bold;}</style></head><body><h1>📊 Reporte Mensual</h1>`;
        Object.keys(reporte).reverse().forEach(m => {
            h += `<div class="card"><h2>🗓️ ${m.toUpperCase()}</h2><table><tr><th>Fecha</th><th>Cliente</th><th>Monto</th><th>Ganancia</th></tr>`;
            reporte[m].detalle.forEach(d => h += `<tr><td>${d.fecha}</td><td>${d.nombre}</td><td>$${d.monto.toFixed(2)}</td><td>$${d.utilidad.toFixed(2)}</td></tr>`);
            h += `<tr class="total"><td colspan="2">TOTAL:</td><td>$${reporte[m].prestado.toFixed(2)}</td><td>$${reporte[m].ganancia.toFixed(2)}</td></tr></table></div>`;
        });
        nv.document.write(h + `</body></html>`);
    }

    function agregarPrestamo() {
        const nom = document.getElementById('nombre').value, mon = parseFloat(document.getElementById('monto').value), por = parseFloat(document.getElementById('porcentaje').value) || 0, mod = document.getElementById('modalidad').value, sem = parseInt(document.getElementById('semanas').value) || 2, fec = document.getElementById('fechaInicio').value, cel = document.getElementById('celular').value.replace(/\D/g, '');
        if (!nom || isNaN(mon) || !fec) return;
        const total = mon + (mon * (por / 100)), nC = (mod === 'quincenal') ? 2 : sem;
        prestamos.push({ id: Date.now(), nombre: nom, celular: cel, totalCobrar: total, valorCuotaOriginal: total/nC, montoOriginal: mon, numSemanasOriginales: sem, fechaInicio: fec, modalidad: mod, porcentajeOriginal: por, pagos: Array.from({length: nC}, () => ({ tipo: 'normal', estado: 0, valor: total/nC })) });
        capitalTotal -= mon; actualizarUI();
    }

    function procesarPrestamo() { if (editandoID) finalizarEdicion(); else agregarPrestamo(); }
    function toggleMes(m) { mesesColapsados[m] = !mesesColapsados[m]; renderizarTabla(); }
    function cambiarModalidad() { document.getElementById('semanas').style.display = (document.getElementById('modalidad').value === 'quincenal') ? 'none' : 'block'; }
    function ajustarCapitalConClave() { if (prompt("Clave:") === CONTRASENA_ADMIN) { const n = prompt("Manual:", capitalTotal.toFixed(2)); if (n) { capitalTotal = parseFloat(n); actualizarUI(); } } }
    function autoRellenar() { if (editandoID) return; const bus = document.getElementById('nombre').value.toLowerCase().trim(); if (bus.length < 2) return; const c = prestamos.find(p => p.nombre.toLowerCase().includes(bus)); if (c) { document.getElementById('celular').value = c.celular || ""; document.getElementById('monto').value = c.montoOriginal || ""; document.getElementById('porcentaje').value = c.porcentajeOriginal || 0; } }
    function prepararEdicion(id) { if (prompt("Clave:") !== CONTRASENA_ADMIN) return; const p = prestamos.find(x => x.id === id); editandoID = id; document.getElementById('nombre').value = p.nombre; document.getElementById('celular').value = p.celular; document.getElementById('monto').value = p.montoOriginal; document.getElementById('porcentaje').value = p.porcentajeOriginal; document.getElementById('modalidad').value = p.modalidad; document.getElementById('semanas').value = p.numSemanasOriginales; document.getElementById('fechaInicio').value = p.fechaInicio; document.getElementById('btnRegistrar').innerText = "Guardar Cambios"; cambiarModalidad(); window.scrollTo({top: 0, behavior: 'smooth'}); }
    function finalizarEdicion() { const p = prestamos.find(x => x.id === editandoID), monN = parseFloat(document.getElementById('monto').value); capitalTotal += (p.montoOriginal - monN); p.nombre = document.getElementById('nombre').value; p.celular = document.getElementById('celular').value.replace(/\D/g, ''); p.montoOriginal = monN; p.porcentajeOriginal = parseFloat(document.getElementById('porcentaje').value) || 0; p.modalidad = document.getElementById('modalidad').value; p.numSemanasOriginales = parseInt(document.getElementById('semanas').value) || 2; p.fechaInicio = document.getElementById('fechaInicio').value; const nT = p.montoOriginal + (p.montoOriginal * (p.porcentajeOriginal / 100)), nC = (p.modalidad === 'quincenal') ? 2 : p.numSemanasOriginales; p.totalCobrar = nT; p.valorCuotaOriginal = nT / nC; p.pagos = Array.from({length: nC}, () => ({ tipo: 'normal', estado: 0, valor: nT / nC })); editandoID = null; document.getElementById('btnRegistrar').innerText = "Registrar"; actualizarUI(); }
    function agregarMulta(pId) { if (prompt("Clave multa ($5):") === CONTRASENA_ADMIN) { const p = prestamos.find(x => x.id === pId); p.pagos.push({ tipo: 'extra', estado: 0, valor: 5 }); p.totalCobrar += 5; actualizarUI(); } }
    function menuEliminar(id) { const opc = prompt("1. Borrar Última Multa\n2. Borrar Préstamo Completo"); if (opc === "1" && prompt("Clave:") === CONTRASENA_ADMIN) { const p = prestamos.find(x => x.id === id); const idx = [...p.pagos].reverse().findIndex(pag => pag.tipo === 'extra'); if (idx !== -1) { const rIdx = p.pagos.length - 1 - idx; if (p.pagos[rIdx].estado === 1) capitalTotal -= 5; p.totalCobrar -= 5; p.pagos.splice(rIdx, 1); actualizarUI(); } } else if (opc === "2" && prompt("Clave:") === CONTRASENA_ADMIN) { const p = prestamos.find(x => x.id === id); capitalTotal += p.montoOriginal; prestamos = prestamos.filter(x => x.id !== id); actualizarUI(); } }
    function actualizarUI() { document.getElementById('capitalGlobal').value = capitalTotal.toFixed(2); prestamos.sort((a, b) => new Date(a.fechaInicio + "T00:00:00") - new Date(b.fechaInicio + "T00:00:00")); renderizarTabla(); calcularGanancias(); generarNotificaciones(); if(!editandoID) ["nombre", "celular", "monto", "porcentaje", "semanas", "fechaInicio"].forEach(id => { const el = document.getElementById(id); if(el) el.value = ""; }); }
    async function guardarEnNube() { if (!confirm("¿Guardar?")) return; try { await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ capital: capitalTotal, prestamos: prestamos }) }); alert("✅ Guardado."); } catch (e) { alert("❌ Error."); } }
    async function cargarDeNube(silencioso = false) { try { const response = await fetch(WEB_APP_URL); const data = await response.json(); if (data) { prestamos = data.prestamos || []; capitalTotal = parseFloat(data.capital) || 0; actualizarUI(); if(!silencioso) alert("✅ Sincronizado."); } } catch (e) { if(!silencioso) alert("❌ Error."); } }

    window.onload = () => cargarDeNube(true);
</script>
</body>
